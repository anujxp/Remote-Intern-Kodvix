spring.application.name=HosptitalManagement

# MySQL Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL Dialect (Optional in newer Spring Boot versions, but good for clarity)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect